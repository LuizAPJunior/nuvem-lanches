version: '3.8'

services:
  # Back-end (Node + Supabase)
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: nuvem-lanches-api
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules # Não deixa o Docker sobrescrever os módulos internos
    environment:
      - NODE_ENV=development
      # Se tiver um arquivo .env, o Docker vai ler as chaves do Supabase aqui:
    env_file:
      - ./server/.env 